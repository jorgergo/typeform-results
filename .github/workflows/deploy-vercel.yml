name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN_TYPEFORM }}" ]; then
            echo "Missing required secret: VERCEL_TOKEN_TYPEFORM"
            exit 1
          fi
          if [ -z "${{ secrets.VERCEL_ORG_ID }}" ]; then
            echo "Missing required secret: VERCEL_ORG_ID"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Link project non-interactively
        run: vercel link --yes --non-interactive --token=${{ secrets.VERCEL_TOKEN_TYPEFORM }} --team=${{ secrets.VERCEL_ORG_ID }} --project=typeform-results

      - name: Deploy to production
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN_TYPEFORM }} --scope=${{ secrets.VERCEL_ORG_ID }}
